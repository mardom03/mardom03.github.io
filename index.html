<!DOCTYPE html>
<html>
<head>
    <title>
        Martin Domaradzki
    </title>
    <script type="text/javascript">
        function calculate() {
            var ml = parseInt(document.getElementById("input1").value);
            var percent = parseInt(document.getElementById("input2").value);
            percent = percent / 100;
            var drinks = ml * 0.03519508 * percent / .6;
            document.getElementById("result").innerHTML = "Result: " + drinks.toFixed(3) + " standard drinks";
        }
    </script>
</head>
<body>
<h1>Hello World</h1>
<p>I'm hosted with GitHub Pages.</p>
<div>
    <h4>How many drinks are in this bottle?</h4>
    <br />
    <p>How many ml of alcohol?</p>
    <input id="input1" />
    <p>What percentage alcohol?</p>
    <input id="input2" /> %
    <p id="result">Result: </p>
    <button onclick="calculate()">Calculate</button>
</div>
</body>
</html>
